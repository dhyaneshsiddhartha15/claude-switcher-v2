<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Add ClaudeSwitch account</title>
    <style>
      body {
        font-family: -apple-system, Segoe UI, sans-serif;
        margin: 0;
        padding: 20px;
        background: #1e1e1e;
        color: #eee;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      p {
        font-size: 12px;
        color: #999;
        margin: 0 0 12px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #2a2a2a;
        color: #eee;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
        border-radius: 6px;
        border: none;
        background: #d67642;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #error {
        color: #f28b82;
        font-size: 12px;
        margin-top: 8px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h1>Save the current Claude Code session</h1>
    <p>Copies the active config directory into a new named account.</p>
    <input id="name" type="text" placeholder="e.g. work" autofocus />
    <button id="save">Save account</button>
    <div id="error"></div>
    <script>
      const input = document.getElementById('name');
      const button = document.getElementById('save');
      const error = document.getElementById('error');

      async function submit() {
        button.disabled = true;
        error.textContent = '';
        const result = await window.claudeswitch.addAccount(input.value);
        if (!result.ok) {
          error.textContent = result.error;
          button.disabled = false;
          return;
        }
        window.close();
      }

      button.addEventListener('click', submit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });
    </script>
  </body>
</html>
