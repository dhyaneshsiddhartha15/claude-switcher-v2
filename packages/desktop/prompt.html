<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Add ClaudeSwitch account</title>
    <style>
      /* Glassmorphism + Claymorphism — matches the popup and landing page. */
      :root {
        --purple: #a78bfa;
        --sky: #7dd3fc;
        --mint: #6ee7b7;
        --pink: #f9a8d4;
        --text: #f3ecff;
        --text-muted: #c3b6e8;
        --glass-strong: rgba(52, 42, 92, 0.72);
        --glass-border: rgba(255, 255, 255, 0.18);
        --clay-shadow: 0 8px 20px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
        background: transparent;
        overflow: hidden;
      }

      .shell {
        position: relative;
        height: 100vh;
        margin: 6px;
        border-radius: 24px;
        padding: 20px;
        background: rgba(38, 30, 68, 0.55);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .shell::before {
        content: '';
        position: absolute;
        inset: -40%;
        z-index: -1;
        background:
          radial-gradient(40% 40% at 15% 10%, var(--purple), transparent 60%),
          radial-gradient(45% 45% at 90% 100%, var(--sky), transparent 60%),
          radial-gradient(40% 40% at 100% 0%, var(--pink), transparent 60%);
        filter: blur(30px);
        opacity: 0.5;
      }

      h1 {
        font-size: 15px;
        font-weight: 800;
        margin: 0 0 6px;
        letter-spacing: -0.01em;
      }

      p {
        font-size: 12.5px;
        color: var(--text-muted);
        margin: 0 0 14px;
        line-height: 1.45;
      }

      input,
      button {
        -webkit-app-region: no-drag;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        font-size: 14px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: var(--glass-strong);
        color: var(--text);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        outline: none;
      }

      input::placeholder {
        color: rgba(195, 182, 232, 0.6);
      }

      input:focus {
        border-color: rgba(167, 139, 250, 0.7);
        box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.25);
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        flex: 1;
        padding: 11px;
        font-size: 13.5px;
        font-weight: 700;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        box-shadow: var(--clay-shadow);
        transition: transform 0.12s ease;
      }
      button:hover {
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(1px) scale(0.98);
      }

      #cancel {
        background: var(--glass-strong);
        color: var(--text);
      }

      #save {
        color: #fff;
        background: linear-gradient(135deg, var(--purple), #818cf8 55%, var(--sky));
      }
      #save:disabled {
        opacity: 0.6;
        cursor: default;
        transform: none;
      }

      #error {
        color: var(--pink);
        font-size: 12px;
        margin-top: 10px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>Save the current Claude Code session</h1>
      <p>Copies the active config directory into a new named account.</p>
      <input id="name" type="text" placeholder="e.g. work" autofocus />
      <div class="row">
        <button id="cancel">Cancel</button>
        <button id="save">Save account</button>
      </div>
      <div id="error"></div>
    </div>
    <script>
      const input = document.getElementById('name');
      const button = document.getElementById('save');
      const cancel = document.getElementById('cancel');
      const error = document.getElementById('error');

      async function submit() {
        button.disabled = true;
        error.textContent = '';
        const result = await window.claudeswitch.addAccount(input.value);
        if (!result.ok) {
          error.textContent = result.error;
          button.disabled = false;
          return;
        }
        window.close();
      }

      button.addEventListener('click', submit);
      cancel.addEventListener('click', () => window.close());
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
        if (e.key === 'Escape') window.close();
      });
    </script>
  </body>
</html>
