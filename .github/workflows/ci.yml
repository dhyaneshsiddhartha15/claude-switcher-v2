name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-smoke-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm install

      - name: Exercise CLI against a fake config dir (bash)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export CLAUDE_CONFIG_DIR="$RUNNER_TEMP/fake-claude-config"
          mkdir -p "$CLAUDE_CONFIG_DIR"
          echo '{}' > "$CLAUDE_CONFIG_DIR/credentials.json"
          node packages/cli/bin/claudeswitch.js add --name ci-test
          node packages/cli/bin/claudeswitch.js list
          node packages/cli/bin/claudeswitch.js current
          node packages/cli/bin/claudeswitch.js remove ci-test -y

      - name: Exercise CLI against a fake config dir (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CLAUDE_CONFIG_DIR = "$env:RUNNER_TEMP\fake-claude-config"
          New-Item -ItemType Directory -Force -Path $env:CLAUDE_CONFIG_DIR | Out-Null
          '{}' | Set-Content "$env:CLAUDE_CONFIG_DIR\credentials.json"
          node packages/cli/bin/claudeswitch.js add --name ci-test
          node packages/cli/bin/claudeswitch.js list
          node packages/cli/bin/claudeswitch.js current
          node packages/cli/bin/claudeswitch.js remove ci-test -y

  landing-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build --workspace=apps/landing
